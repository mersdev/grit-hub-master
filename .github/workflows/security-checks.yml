name: Security Checks

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-and-skill-readiness:
    name: Security and skill readiness
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python test dependencies
        run: python -m pip install --upgrade pip pytest pyyaml

      - name: Run skill readiness gate
        run: python tests/skill-evals/run_skill_eval.py --all --strict

      - name: Run SkillSpector-style security tests
        run: python -m pytest tests/security-script -q

      - name: Verify setup dry run
        run: node setup.js --dry-run --skip-python
