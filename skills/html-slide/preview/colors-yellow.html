<!doctype html><html><head><meta charset="utf-8"><title>Yellow ramp</title>
<link rel="stylesheet" href="../../pptx/colors_and_type.css">
<style>
  html,body{margin:0;font-family:var(--font-sans);background:#fff;}
  .row{display:grid;grid-template-columns:repeat(7,1fr);height:130px;}
  .s{padding:12px;display:flex;flex-direction:column;justify-content:space-between;font-size:10px;}
  .s .n{font-weight:700;font-size:11px;}
  .s .h{font-family:var(--font-mono);opacity:.65;letter-spacing:.02em;}
  .s.dark{color:#fff;}
</style></head><body>
<div class="row">
  <div class="s" style="background:#FFF5CC;"><div class="n">100</div><div class="h">#FFF5CC</div></div>
  <div class="s" style="background:#FFF0B2;"><div class="n">200</div><div class="h">#FFF0B2</div></div>
  <div class="s" style="background:#FFE57F;"><div class="n">300</div><div class="h">#FFE57F</div></div>
  <div class="s" style="background:#FFDB4C;"><div class="n">400</div><div class="h">#FFDB4C</div></div>
  <div class="s" style="background:#FFCC00;"><div class="n">500 · base</div><div class="h">#FFCC00</div></div>
  <div class="s" style="background:#E6B800;"><div class="n">600</div><div class="h">#E6B800</div></div>
  <div class="s dark" style="background:#B38F00;"><div class="n">700</div><div class="h">#B38F00</div></div>
</div>
</body></html>
