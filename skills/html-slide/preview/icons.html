<!doctype html><html><head><meta charset="utf-8"><title>Icons</title>
<link rel="stylesheet" href="../../pptx/colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-sans);color:#000;}
  body{padding:22px;display:grid;grid-template-columns:repeat(8,1fr);gap:18px 14px;justify-items:center;}
  .ico{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:9px;color:var(--fg-muted);font-family:var(--font-mono);}
  i{width:28px;height:28px;color:var(--dhl-red);}
</style></head><body>
<div class="ico"><i data-lucide="package"></i><span>package</span></div>
<div class="ico"><i data-lucide="truck"></i><span>truck</span></div>
<div class="ico"><i data-lucide="map-pin"></i><span>map-pin</span></div>
<div class="ico"><i data-lucide="globe"></i><span>globe</span></div>
<div class="ico"><i data-lucide="plane"></i><span>plane</span></div>
<div class="ico"><i data-lucide="search"></i><span>search</span></div>
<div class="ico"><i data-lucide="user"></i><span>user</span></div>
<div class="ico"><i data-lucide="bell"></i><span>bell</span></div>
<div class="ico"><i data-lucide="calendar"></i><span>calendar</span></div>
<div class="ico"><i data-lucide="clock"></i><span>clock</span></div>
<div class="ico"><i data-lucide="check-circle-2"></i><span>check</span></div>
<div class="ico"><i data-lucide="alert-triangle"></i><span>alert</span></div>
<div class="ico"><i data-lucide="qr-code"></i><span>qr</span></div>
<div class="ico"><i data-lucide="credit-card"></i><span>card</span></div>
<div class="ico"><i data-lucide="file-text"></i><span>label</span></div>
<div class="ico"><i data-lucide="arrow-right"></i><span>arrow-r</span></div>
<script>lucide.createIcons();</script>
</body></html>
