<!doctype html><html><head><meta charset="utf-8"><title>Red ramp</title>
<link rel="stylesheet" href="../../pptx/colors_and_type.css">
<style>
  html,body{margin:0;font-family:var(--font-sans);background:#fff;}
  .row{display:grid;grid-template-columns:repeat(6,1fr);height:130px;}
  .s{padding:12px;display:flex;flex-direction:column;justify-content:space-between;font-size:10px;color:#000;}
  .s .n{font-weight:700;font-size:11px;}
  .s .h{font-family:var(--font-mono);opacity:.7;letter-spacing:.02em;}
  .s.dark{color:#fff;}
  .s.dark .h{opacity:.8;}
</style></head><body>
<div class="row">
  <div class="s" style="background:#FBE0E2;"><div class="n">100</div><div class="h">#FBE0E2</div></div>
  <div class="s" style="background:#F4B0B5;"><div class="n">200</div><div class="h">#F4B0B5</div></div>
  <div class="s dark" style="background:#E33A44;"><div class="n">400</div><div class="h">#E33A44</div></div>
  <div class="s dark" style="background:#D40511;"><div class="n">500 · base</div><div class="h">#D40511</div></div>
  <div class="s dark" style="background:#BD0510;"><div class="n">600</div><div class="h">#BD0510</div></div>
  <div class="s dark" style="background:#A30410;"><div class="n">700</div><div class="h">#A30410</div></div>
</div>
</body></html>
