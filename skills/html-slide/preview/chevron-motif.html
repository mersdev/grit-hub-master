<!doctype html><html><head><meta charset="utf-8"><title>Chevron motif</title>
<link rel="stylesheet" href="../../pptx/colors_and_type.css">
<style>
  html,body{margin:0;background:var(--dhl-yellow);font-family:var(--font-sans);color:#000;height:100%;overflow:hidden;}
  body{padding:28px 32px;display:flex;flex-direction:column;justify-content:center;position:relative;}
  .chevrons{position:absolute;right:-40px;top:50%;transform:translateY(-50%);display:flex;gap:0;}
  .ch{width:90px;height:130px;background:var(--dhl-red);clip-path:polygon(0 0, 60% 0, 100% 50%, 60% 100%, 0 100%, 40% 50%);}
  h1{font-family:var(--font-display);font-weight:900;font-size:42px;line-height:.98;margin:0 0 6px;max-width:60%;}
  p{font-size:13px;max-width:55%;color:rgba(0,0,0,.78);margin:0;}
  .label{position:absolute;bottom:10px;left:12px;font:700 9px/1 var(--font-sans);letter-spacing:.06em;text-transform:uppercase;color:rgba(0,0,0,.5);}
</style></head><body>
<div class="chevrons">
  <div class="ch" style="background:rgba(212,5,17,.45);"></div>
  <div class="ch" style="background:rgba(212,5,17,.75);margin-left:-30px"></div>
  <div class="ch" style="margin-left:-30px"></div>
</div>
<h1>Moving forward, always.</h1>
<p>The chevron is DHL's directional mark — used at scale in corners, never as ornament.</p>
<span class="label">Brand motif · chevron set</span>
</body></html>
