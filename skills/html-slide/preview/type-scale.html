<!doctype html><html><head><meta charset="utf-8"><title>Type scale</title>
<link rel="stylesheet" href="../../pptx/colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-sans);}
  body{padding:20px 28px;}
  .row{display:flex;align-items:baseline;gap:18px;padding:6px 0;border-bottom:1px solid var(--dhl-gray-100);}
  .row:last-child{border:0;}
  .meta{color:var(--fg-subtle);font-size:11px;font-family:var(--font-mono);min-width:130px;}
  .sample{color:var(--fg);}
  .h1{font-size:36px;font-weight:700;line-height:1.1;}
  .h2{font-size:28px;font-weight:700;line-height:1.15;}
  .h3{font-size:18px;font-weight:700;line-height:1.2;}
  .body{font-size:15px;font-weight:400;line-height:1.4;}
  .body-sm{font-size:12px;font-weight:400;line-height:1.4;}
  .foot{font-size:10px;font-weight:400;line-height:1.4;color:var(--fg-muted);}
</style></head><body>
<div class="row"><span class="meta">H1 · Bold 36</span><span class="sample h1">Sample title</span></div>
<div class="row"><span class="meta">H2 · Bold 28</span><span class="sample h2">Statement title</span></div>
<div class="row"><span class="meta">H3 · Bold 18</span><span class="sample h3">Section headline</span></div>
<div class="row"><span class="meta">Body · Reg 15</span><span class="sample body">The copy text is left-aligned, set in Delivery Regular.</span></div>
<div class="row"><span class="meta">Small · Reg 12</span><span class="sample body-sm">Smaller body for dense UI and footnotes.</span></div>
<div class="row"><span class="meta">Footnote · 10</span><span class="sample foot">1) Tabular numerals for tracking IDs and tables.</span></div>
</body></html>
