<!doctype html><html><head><meta charset="utf-8"><title>Brand backgrounds</title>
<link rel="stylesheet" href="../../pptx/colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;height:170px;}
  .pic{background-size:cover;background-position:center;position:relative;display:flex;align-items:flex-end;padding:8px;}
  .pic span{font:700 9px/1 var(--font-sans);letter-spacing:.06em;text-transform:uppercase;color:rgba(0,0,0,.7);background:rgba(255,255,255,.85);padding:3px 6px;}
</style></head><body>
<div class="row">
  <div class="pic" style="background-image:url('../assets/backgrounds/Virtual_Background_Arrows_1_Postyellow.png');"><span>Yellow · Arrows</span></div>
  <div class="pic" style="background-image:url('../assets/backgrounds/Virtual_Background_Arrows_2_Green.png');"><span>Green · campaign</span></div>
  <div class="pic" style="background-image:url('../assets/backgrounds/Virtual_Background_Arrows_3_Blue.png');"><span>Blue · campaign</span></div>
  <div class="pic" style="background-image:url('../assets/backgrounds/Virtual_Background_Arrows_4_Violet.png');"><span>Violet · campaign</span></div>
</div>
</body></html>
