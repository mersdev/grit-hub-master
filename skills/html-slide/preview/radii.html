<!doctype html><html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../../pptx/colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-sans);color:#000;}
  body{padding:20px;display:flex;gap:18px;align-items:flex-end;justify-content:space-between;}
  .swatch{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:72px;height:72px;background:var(--dhl-yellow);border:1px solid var(--dhl-gray-300);}
  .name{font-size:11px;font-weight:700;}
  .val{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);}
</style></head><body>
<div class="swatch"><div class="box" style="border-radius:0"></div><div class="name">none</div><div class="val">0</div></div>
<div class="swatch"><div class="box" style="border-radius:2px"></div><div class="name">xs</div><div class="val">2 px</div></div>
<div class="swatch"><div class="box" style="border-radius:4px"></div><div class="name">sm · buttons</div><div class="val">4 px</div></div>
<div class="swatch"><div class="box" style="border-radius:8px"></div><div class="name">md · cards</div><div class="val">8 px</div></div>
<div class="swatch"><div class="box" style="border-radius:12px"></div><div class="name">lg</div><div class="val">12 px</div></div>
<div class="swatch"><div class="box" style="border-radius:999px"></div><div class="name">pill · chips</div><div class="val">∞</div></div>
</body></html>
