<!doctype html><html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="../../pptx/colors_and_type.css">
<style>
  html,body{margin:0;font-family:var(--font-sans);background:#fff;}
  .row{display:grid;grid-template-columns:repeat(10,1fr);height:130px;}
  .s{padding:10px;display:flex;flex-direction:column;justify-content:space-between;font-size:9px;color:#000;}
  .s .n{font-weight:700;font-size:10px;}
  .s .h{font-family:var(--font-mono);opacity:.65;letter-spacing:.02em;}
  .s.dark{color:#fff;}
  .s.dark .h{opacity:.8;}
</style></head><body>
<div class="row">
  <div class="s" style="background:#FAFAFA;"><div class="n">50</div><div class="h">#FAFAFA</div></div>
  <div class="s" style="background:#F2F2F2;"><div class="n">100</div><div class="h">#F2F2F2</div></div>
  <div class="s" style="background:#EBEBEB;"><div class="n">150</div><div class="h">#EBEBEB</div></div>
  <div class="s" style="background:#E5E5E5;"><div class="n">200</div><div class="h">#E5E5E5</div></div>
  <div class="s" style="background:#CCCCCC;"><div class="n">300</div><div class="h">#CCCCCC</div></div>
  <div class="s" style="background:#B2B2B2;"><div class="n">400</div><div class="h">#B2B2B2</div></div>
  <div class="s dark" style="background:#8C8C8C;"><div class="n">500</div><div class="h">#8C8C8C</div></div>
  <div class="s dark" style="background:#666666;"><div class="n">600</div><div class="h">#666666</div></div>
  <div class="s dark" style="background:#333333;"><div class="n">800</div><div class="h">#333333</div></div>
  <div class="s dark" style="background:#000000;"><div class="n">black</div><div class="h">#000000</div></div>
</div>
</body></html>
