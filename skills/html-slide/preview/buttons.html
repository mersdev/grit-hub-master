<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../../pptx/colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-sans);color:#000;}
  body{padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:center;}
  .pane{padding:18px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
  .pane.yellow{background:var(--dhl-yellow);}
  .pane.white{background:#fff;border:1px solid var(--dhl-gray-200);}
  .btn{font:700 14px/1 var(--font-sans);padding:11px 18px;border:0;border-radius:4px;cursor:pointer;letter-spacing:.01em;}
  .btn-primary{background:var(--dhl-red);color:#fff;}
  .btn-primary:hover{background:#BD0510;}
  .btn-secondary{background:#000;color:#fff;}
  .btn-ghost{background:transparent;color:#000;border:1.5px solid #000;}
  .btn-link{background:transparent;color:var(--dhl-red);text-decoration:underline;padding:11px 4px;}
  .btn-sm{padding:7px 12px;font-size:12px;}
  .label{position:absolute;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(0,0,0,.55);}
  .pane{position:relative;}
  .pane.yellow .label{color:rgba(0,0,0,.55);top:6px;left:10px;}
  .pane.white .label{color:var(--fg-subtle);top:6px;left:10px;}
</style></head><body>
<div class="pane white">
  <span class="label">On white</span>
  <button class="btn btn-primary">Track Shipment</button>
  <button class="btn btn-secondary">Get a Quote</button>
  <button class="btn btn-ghost">Cancel</button>
  <button class="btn btn-link">Learn more →</button>
</div>
<div class="pane yellow">
  <span class="label">On yellow</span>
  <button class="btn btn-secondary">Track Shipment</button>
  <button class="btn btn-ghost">Find a Location</button>
  <button class="btn btn-primary btn-sm">Confirm</button>
</div>
</body></html>
