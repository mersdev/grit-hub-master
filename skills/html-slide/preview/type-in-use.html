<!doctype html><html><head><meta charset="utf-8"><title>Type in use</title>
<link rel="stylesheet" href="../../pptx/colors_and_type.css">
<style>
  html,body{margin:0;background:var(--dhl-yellow);font-family:var(--font-sans);color:#000;height:100%;}
  body{padding:28px 36px;display:flex;flex-direction:column;justify-content:space-between;height:calc(100% - 56px);}
  .top{display:flex;justify-content:space-between;align-items:flex-start;}
  img.logo{height:28px;}
  .eyebrow{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(0,0,0,.55);}
  h1{font-family:var(--font-display);font-weight:900;font-size:60px;line-height:.98;letter-spacing:-.01em;margin:14px 0 10px;}
  .sub{font-weight:400;font-size:18px;line-height:1.35;max-width:600px;color:rgba(0,0,0,.78);}
  .signoff{font-weight:700;font-size:11px;letter-spacing:.04em;}
</style></head><body>
<div>
  <div class="top">
    <span class="eyebrow">Express · Worldwide</span>
    <img class="logo" src="../assets/logos/DHL_Logo_rgb.svg"/>
  </div>
  <h1>Send it on its way.<br>Today.</h1>
  <p class="sub">From one city to the next, or one continent to another — schedule a pickup, print a label, hand it off in minutes.</p>
</div>
<div class="signoff">Excellence. Simply delivered.</div>
</body></html>
