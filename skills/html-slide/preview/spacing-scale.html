<!doctype html><html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../../pptx/colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-sans);color:#000;}
  body{padding:20px 28px;}
  .row{display:flex;align-items:center;gap:14px;padding:5px 0;}
  .label{font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle);min-width:120px;}
  .bar{height:14px;background:var(--dhl-yellow);border-left:2px solid var(--dhl-red);}
  .val{font-family:var(--font-mono);font-size:11px;color:var(--fg-muted);}
</style></head><body>
<div class="row"><span class="label">--space-1</span><span class="bar" style="width:4px"></span><span class="val">4 px</span></div>
<div class="row"><span class="label">--space-2</span><span class="bar" style="width:8px"></span><span class="val">8 px</span></div>
<div class="row"><span class="label">--space-3</span><span class="bar" style="width:12px"></span><span class="val">12 px</span></div>
<div class="row"><span class="label">--space-4</span><span class="bar" style="width:16px"></span><span class="val">16 px</span></div>
<div class="row"><span class="label">--space-6</span><span class="bar" style="width:24px"></span><span class="val">24 px</span></div>
<div class="row"><span class="label">--space-8</span><span class="bar" style="width:32px"></span><span class="val">32 px</span></div>
<div class="row"><span class="label">--space-12</span><span class="bar" style="width:48px"></span><span class="val">48 px</span></div>
<div class="row"><span class="label">--space-20</span><span class="bar" style="width:80px"></span><span class="val">80 px</span></div>
</body></html>
