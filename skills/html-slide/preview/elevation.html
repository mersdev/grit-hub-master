<!doctype html><html><head><meta charset="utf-8"><title>Elevation</title>
<link rel="stylesheet" href="../../pptx/colors_and_type.css">
<style>
  html,body{margin:0;background:var(--dhl-gray-100);font-family:var(--font-sans);color:#000;}
  body{padding:28px;display:flex;gap:24px;justify-content:space-around;align-items:center;}
  .card{width:120px;height:96px;background:#fff;border-radius:6px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;}
  .name{font-size:11px;font-weight:700;}
  .val{font-family:var(--font-mono);font-size:9px;color:var(--fg-muted);}
  .c0{border:1px solid var(--dhl-gray-200);}
  .c1{box-shadow:0 1px 2px rgba(0,0,0,.06);}
  .c2{box-shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);}
  .c3{box-shadow:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);}
  .c4{box-shadow:0 12px 28px rgba(0,0,0,.12),0 4px 10px rgba(0,0,0,.06);}
</style></head><body>
<div class="card c0"><div class="name">flat</div><div class="val">border only</div></div>
<div class="card c1"><div class="name">xs</div><div class="val">1·2 / .06</div></div>
<div class="card c2"><div class="name">sm · cards</div><div class="val">1·3 / .08</div></div>
<div class="card c3"><div class="name">md · menu</div><div class="val">4·12 / .08</div></div>
<div class="card c4"><div class="name">lg · modal</div><div class="val">12·28 / .12</div></div>
</body></html>
